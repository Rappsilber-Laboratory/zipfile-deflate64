name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.python-version }} ${{ matrix.free-threaded && '(free-threaded)' || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        free-threaded: [false]
        include:
          - os: ubuntu-latest
            python-version: "3.13"
            free-threaded: true
          - os: macos-latest
            python-version: "3.13"
            free-threaded: true
          - os: windows-latest
            python-version: "3.13"
            free-threaded: true

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        free-threaded: ${{ matrix.free-threaded }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

    - name: Run tests (via tox)
      run: |
        tox -e test
